name: .NET Tests

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'src/ClipFlow/**'
      - '.github/workflows/dotnet-tests.yml'
  pull_request:
    paths:
      - 'src/ClipFlow/**'
      - '.github/workflows/dotnet-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ClipFlow

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ClipFlow.sln

      - name: Build
        run: dotnet build ClipFlow.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ClipFlow.sln --configuration Release --no-build --verbosity normal
